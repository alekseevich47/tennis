# === RATE LIMITING (защита от спама/брута) ===
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=map:10m rate=30r/s;

# === UPSTREAMS (keepalive для производительности) ===
upstream pocketbase {
    server 192.168.1.170:8090;
    keepalive 32;
}

upstream mapserver {
    server 192.168.1.172:8080;
    keepalive 16;
}

upstream pocketbase_tt {
    server 192.168.1.170:8091;
    keepalive 32;
}

upstream tt_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    server_name urban42.online www.urban42.online api.urban42.online;
    listen 443 ssl http2; # http2 для скорости
    
    # SSL (Certbot)
    ssl_certificate /etc/letsencrypt/live/urban42.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/urban42.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # === БЕЗОПАСНОСТЬ ===
    #add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # === 1. PocketBase API ===
    location /api/ {
        limit_req zone=api burst=50 nodelay; # Rate limit
        
        proxy_pass http://pocketbase;
        proxy_http_version 1.1;
        
        # WebSocket для Realtime
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Проксирование заголовков
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты для загрузки фото/галереи
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50M; # Макс. размер файла
    }

    # === 2. PocketBase Admin UI ===
    location /_/ {
        proxy_pass http://pocketbase;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Админку тоже защищаем рейт-лимитом
        limit_req zone=api burst=50 nodelay;
    }

    # === 4. PocketBase TT Bot API ===
    location /tt/api/ {
        proxy_pass http://pocketbase_tt/api/; # /api/ Слэш в конце важен
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === 5. PocketBase TT Admin UI ===
    location /tt/_/ {
        proxy_pass http://pocketbase_tt/_/; # Слэш в конце важен
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === 6. Фронтенд (Mini App) ===
    location /tt-api/ {
        alias /home/sa/tt_bot/client/dist/;
        index index.html;
        # Важно: добавляем префикс пути к index.html для корректной работы alias
        try_files $uri $uri/ /tt-api/index.html; 
        
        # Добавляем кэширование статики (картинки, скрипты)
        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }
    }

    # === 3. Map Tiles (OSM Vector) ===
    location /map/ {
        limit_req zone=map burst=50 nodelay;
        
        proxy_pass http://mapserver/; # Обрати внимание на / в конце
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # === КЭШИРОВАНИЕ ТАЙЛОВ (критично для скорости карты!) ===
        proxy_cache_valid 200 1d; # Кэшировать успешные ответы на 24 часа
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header Cache-Control "public, max-age=86400, immutable";
        add_header X-Cache-Status $upstream_cache_status; # Для отладки
        
        # Если используешь proxy_cache, раскомментируй:
        proxy_cache map_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
    }

    # === Health Check (для мониторинга) ===
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }



}

# === HTTP → HTTPS Redirect (чистый вариант) ===
server {
    if ($host = www.urban42.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = urban42.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = api.urban42.online) {
	return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name urban42.online www.urban42.online api.urban42.online;
    
    # Let's Encrypt challenge (не ломать авто-обновление сертификатов)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Всё остальное редиректим на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }




}
